name: StaffService CI

on:
  push:
    paths:
      - 'StaffService/**'
      - 'Shared/**'
      - 'docker-compose.yml'
      - '.github/workflows/staff-service-ci.yml'
  pull_request:
    paths:
      - 'StaffService/**'
      - 'Shared/**'
      - 'docker-compose.yml'
      - '.github/workflows/staff-service-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: |
          dotnet restore StaffService/StaffService.csproj
          dotnet restore StaffService/StaffService.Tests/StaffService.Tests.csproj

      - name: Build service
        run: dotnet build StaffService/StaffService.csproj --no-restore -c Release

      - name: Build tests
        run: dotnet build StaffService/StaffService.Tests/StaffService.Tests.csproj --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test StaffService/StaffService.Tests/StaffService.Tests.csproj \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName~Unit" \
            --logger "github-actions;verbosity=normal" \
            --results-directory ./test-results/unit

      - name: Run integration tests
        run: |
          dotnet test StaffService/StaffService.Tests/StaffService.Tests.csproj \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName~Integration" \
            --logger "github-actions;verbosity=normal" \
            --results-directory ./test-results/integration
        env:
          DOTNET_ENVIRONMENT: Testing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-staff-service
          path: ./test-results/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f StaffService/Dockerfile \
            -t staff-service:${{ github.sha }} \
            .
